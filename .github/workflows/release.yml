name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Elevate wrapper permissions
        run: chmod +x ./gradlew

      - name: Build mod jar
        run: ./gradlew build --no-daemon

      - name: Read mod version
        id: ver
        run: echo "version=$(grep '^mod_version=' gradle.properties | cut -d= -f2)" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        continue-on-error: true
        with:
          subject-path: 'build/libs/ProxyBridge-*+fabric-*.jar'

      - name: Publish release
        uses: ncipollo/release-action@v1
        with:
          # tag pushes use their own ref; manual runs publish/update v<mod_version>
          tag: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', steps.ver.outputs.version) }}
          name: ProxyBridge v${{ steps.ver.outputs.version }}
          artifacts: "build/libs/ProxyBridge-*+fabric-*.jar"
          allowUpdates: true
          replacesArtifacts: true
          removeArtifacts: true
          prerelease: true
          artifactErrorsFailBuild: true
          body: |
            Fabric **client** mod for [AquariusProxy](https://github.com/aquariusnetwork9/AquariusProxy) / ZenithProxy (MC 1.21.4) — built by GitHub Actions.

            Live waypoints + swap/pull control + multi-bot remote pull + muted-safe whisper intercept + the in-game RBAC admin screen (`/pb admin`). Drop the jar (plus Fabric API) into a 1.21.4 Fabric client and connect **through** the proxy.

            Beta — not yet live-tested end-to-end.
